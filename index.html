<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HomeSplit">
<meta name="mobile-web-app-capable" content="yes">
<title>HomeSplit 54/145</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --mint:#2CC6C6;--mint-dk:#18A0A0;--mint-lt:#5DD8D8;
  --mint-pale:#E6F8F8;--mint-bd:#B8E8E8;
  --bg:#C4ECEC;--bg2:#D6F0F0;
  --card:#FFFFFF;--sf:#F4FCFC;
  --bd:#E2F4F4;--bd2:#C8E8E8;
  --tx:#111827;--tx2:#4B5563;--tx3:#9CA3AF;
  --red:#EF4444;--ora:#F97316;--ora-bg:#FFF7ED;
  --grn:#22C55E;--grn-bg:#F0FDF4;
  --r:14px;--rl:20px;--rxl:26px;
  --sh:0 2px 12px rgba(0,0,0,.07);
  --sh2:0 6px 28px rgba(0,0,0,.10);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --f:'IBM Plex Sans Thai',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;font-family:var(--f);background:var(--bg);color:var(--tx);overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}

.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* LOGIN */
#sl{background:linear-gradient(175deg,#AAE0E0 0%,#C4ECEC 55%,#D8F2F2 100%);justify-content:center;align-items:center;padding:2rem 1.5rem}
.l-top{text-align:center;margin-bottom:2rem}
.l-ico{width:76px;height:76px;border-radius:24px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px;box-shadow:var(--sh2)}
.l-top h1{font-size:28px;font-weight:700;color:#111827;letter-spacing:-.5px}
.l-top p{font-size:13px;color:#4B5563;margin-top:4px}
.l-card{background:#fff;border-radius:var(--rxl);padding:1.75rem 1.5rem;width:100%;box-shadow:var(--sh2)}
.l-card h2{font-size:17px;font-weight:700;color:var(--tx);margin-bottom:1.25rem}
.fl{margin-bottom:1rem}
.fl label{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:13px 15px;border-radius:var(--r);border:1.5px solid var(--bd);background:var(--sf);font-family:var(--f);font-size:15px;color:var(--tx);outline:none;transition:border-color .18s,box-shadow .18s}
.fi:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(44,198,198,.15)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--f);font-size:15px;font-weight:700;transition:all .18s}
.btn-p{background:var(--mint);color:#fff;box-shadow:0 4px 16px rgba(44,198,198,.35)}
.btn-p:active{transform:scale(.98);background:var(--mint-dk)}
.btn-g{background:transparent;color:var(--mint);border:1.5px solid var(--mint-bd)}
.btn-g:active{background:var(--mint-pale)}
.btn-r{background:var(--red);color:#fff}
.btn-r:active{opacity:.9}
.sw{text-align:center;margin-top:1rem;font-size:13px;color:var(--tx3)}
.sw span{color:var(--mint);font-weight:600;cursor:pointer}
.err{font-size:12px;color:var(--red);margin-top:5px;display:none}

/* HDR */
.hdr{background:#fff;padding:calc(var(--st) + 10px) 1rem 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh)}
.hl{display:flex;align-items:center;gap:10px}
.h-logo{width:38px;height:38px;border-radius:12px;background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:20px}
.h-t{font-size:16px;font-weight:700;color:var(--tx)}
.h-s{font-size:10px;color:var(--tx3);margin-top:1px}
.ico-btn{width:38px;height:38px;border-radius:12px;background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:background .15s}
.ico-btn:active{background:var(--mint-pale)}

/* NAV */
.nav{background:#fff;border-top:1px solid var(--bd);padding:6px 4px calc(var(--sb) + 6px);display:flex;justify-content:space-around;flex-shrink:0;box-shadow:0 -2px 16px rgba(0,0,0,.06)}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 14px;border-radius:var(--r);cursor:pointer;transition:all .15s;min-width:62px;border:none;background:transparent;font-family:var(--f)}
.ni-i{font-size:22px;line-height:1;transition:transform .15s}
.ni-l{font-size:10px;font-weight:500;color:var(--tx3);transition:color .15s}
.ni.on{background:var(--mint-pale)}
.ni.on .ni-l{color:var(--mint);font-weight:700}
.ni.on .ni-i{transform:scale(1.1)}
.ni:active{transform:scale(.94)}

/* SCROLL */
.sc{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.sc::-webkit-scrollbar{display:none}

.sl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin:4px 0 10px}
.card{background:#fff;border-radius:var(--rl);border:1px solid var(--bd);margin-bottom:12px;box-shadow:var(--sh);overflow:hidden}
.ch{padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.ct{font-size:14px;font-weight:700;color:var(--tx)}
.cb{padding:14px 16px}

.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600}
.bm{background:var(--mint);color:#fff}
.bp{background:var(--mint-pale);color:var(--mint-dk)}
.bok{background:var(--grn-bg);color:#15803D}
.bw{background:var(--ora-bg);color:#C2410C}

/* HERO */
.hero{background:var(--mint);border-radius:var(--rl);padding:18px 18px 16px;margin-bottom:14px;color:#fff;box-shadow:0 6px 24px rgba(44,198,198,.35);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-24px;right:-24px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.12)}
.hero::after{content:'';position:absolute;bottom:-30px;right:36px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.08)}
.h-lbl{font-size:12px;opacity:.85;font-weight:500;margin-bottom:4px}
.h-amt{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:2px}
.h-sub{font-size:11px;opacity:.75}
.h-div{height:1px;background:rgba(255,255,255,.25);margin:12px 0}
.h-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;opacity:.9}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.scard{background:#fff;border-radius:var(--r);border:1px solid var(--bd);padding:13px 14px;box-shadow:var(--sh)}
.sc-lb{font-size:11px;color:var(--tx3);font-weight:500;margin-bottom:4px}
.sc-v{font-size:22px;font-weight:800;color:var(--tx)}
.sc-v.m{color:var(--mint)}
.sc-s{font-size:10px;color:var(--tx3);margin-top:2px}

/* ROWS */
.er{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd)}
.er:last-child{border-bottom:none}
.er-l{display:flex;align-items:center;flex:1}
.er-ic{font-size:22px;margin-right:10px;line-height:1;flex-shrink:0}
.er-n{font-size:13px;font-weight:600;color:var(--tx)}
.er-sp{font-size:11px;color:var(--tx3);margin-top:1px}
.er-a{font-size:14px;font-weight:700;color:var(--tx)}
.ur{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd)}
.ur:last-child{border-bottom:none}
.ur-l{display:flex;align-items:center;gap:10px}
.ur-a{font-size:15px;font-weight:800;color:var(--mint)}

/* AV */
.av{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.av1{background:var(--mint-pale);color:var(--mint-dk)}
.av2{background:#EFF6FF;color:#2563EB}
.av3{background:#FDF4FF;color:#9333EA}
.av4{background:#FFF7ED;color:#EA580C}
.avs{width:34px;height:34px;border-radius:11px;font-size:12px}

/* INPUT PAGE */
.inp-bar{background:var(--mint);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 16px rgba(44,198,198,.3)}
.ev-box{background:var(--mint-pale);border-radius:var(--r);border:1.5px solid var(--mint-bd);padding:12px;margin-bottom:12px}
.ev-t{font-size:11px;font-weight:700;color:var(--mint-dk);margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px}

/* MEMBER */
.mi{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.mi:last-child{border-bottom:none}
.mi-n{font-size:13px;font-weight:700;color:var(--tx)}
.mi-r{font-size:11px;color:var(--tx3);margin-top:1px}

/* SPLIT */
.sp-it{padding:13px 0;border-bottom:1px solid var(--bd)}
.sp-it:last-child{border-bottom:none}
.sp-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sp-n{font-size:13px;font-weight:700;color:var(--tx)}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pr:last-child{margin-bottom:0}
.pr-l{font-size:12px;color:var(--tx2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-in{width:58px;padding:7px 8px;border-radius:9px;border:1.5px solid var(--bd);font-size:13px;font-family:var(--f);text-align:right;outline:none;background:var(--sf);color:var(--tx)}
.pr-in:focus{border-color:var(--mint)}
.pr-sg{font-size:12px;color:var(--tx3);width:12px}

/* REPORT */
.rph{background:var(--mint);border-radius:var(--r);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rph-m{font-size:13px;font-weight:700;color:#fff}
.rph-t{font-size:18px;font-weight:800;color:#fff}

/* FAB */
.fab{position:absolute;bottom:calc(var(--sb) + 76px);right:16px;width:54px;height:54px;border-radius:18px;background:var(--mint);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 6px 20px rgba(44,198,198,.45);display:flex;align-items:center;justify-content:center;transition:all .18s;z-index:50}
.fab:active{transform:scale(.92);background:var(--mint-dk)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:100}
.mo.open{display:flex}
.ms{background:#fff;border-radius:var(--rxl) var(--rxl) 0 0;width:100%;max-width:430px;margin:0 auto;padding:0 0 calc(var(--sb) + 1rem);max-height:92dvh;overflow-y:auto;animation:su .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;background:#E5E7EB;border-radius:2px;margin:14px auto 0}
.mt-h{font-size:18px;font-weight:700;color:var(--tx);padding:14px 18px 0}
.mb{padding:16px 18px}

/* NET BOX */
.net-box{padding:10px 12px;background:var(--mint-pale);border-radius:10px;border:1px solid var(--mint-bd);margin-top:8px}
.net-lbl{font-size:11px;color:var(--mint-dk);font-weight:700;margin-bottom:2px}
.net-v{font-size:18px;font-weight:800;color:var(--mint)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--sb) + 82px);left:50%;transform:translateX(-50%) translateY(14px);background:#1F2937;color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:all .28s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MISC */
.div{height:1px;background:var(--bd);margin:10px 0}
.mt8{margin-top:8px}.mt12{margin-top:12px}
.empty{text-align:center;padding:2.5rem 1rem}
.empty-i{font-size:44px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:700;color:var(--tx2)}
.empty-s{font-size:13px;color:var(--tx3);margin-top:4px}
.ab-r{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd)}
.ab-r:last-child{border-bottom:none}
.ab-n{font-size:13px;font-weight:600;color:var(--tx)}
.ab-v{font-size:12px;color:var(--tx3);font-weight:500}
select.fi{-webkit-appearance:none;appearance:none}
</style>
</head>

function thM(){const n=new Date(),ms=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];return ms[n.getMonth()]+' '+(n.getFullYear()+543)}
function mkK(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')}
function thMK(mk){const[y,m]=mk.split('-'),ms=['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];return ms[parseInt(m)]+' '+(parseInt(y)+543)}
function fmt(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function ini(s){if(!s)return'?';const p=s.trim().split(' ');return p.length>1?(p[0][0]+p[1][0]).toUpperCase():s.substring(0,2).toUpperCase()}
function toast(m,d=2600){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function showMo(id){document.getElementById(id).classList.add('open')}
function closeMo(id){document.getElementById(id).classList.remove('open')}

function mock(action,p){
  if(action==='login'){const u=MU.find(u=>u.email===p.email&&u.pw===p.password);return u?{success:true,user:{id:u.id,name:u.name,email:u.email,role:u.role,c:u.c}}:{success:false,error:'อีเมลหรือรหัสผ่านไม่ถูกต้อง'}}
  if(action==='register'){if(MU.find(u=>u.email===p.email))return{success:false,error:'อีเมลนี้มีในระบบแล้ว'};const nu={id:'u'+Date.now(),name:p.name,email:p.email,role:'member',c:MU.length%4};MU.push({...nu,pw:p.password});return{success:true,user:nu}}
  if(action==='getData')return{success:true,members:MU.map(({pw,...u})=>u),groups:JSON.parse(JSON.stringify(MG)),expenses:[...ME]};
  if(action==='addExpense'){const ex={id:'e'+Date.now(),...p.expense,createdAt:new Date().toISOString()};ME.push(ex);return{success:true,expense:ex}}
  if(action==='updateGroup')return{success:true};
  return{success:false,error:'unknown'};
}

async function api(action,p={}){
  if(CFG.SCRIPT_URL==='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE')return mock(action,p);
  try{const r=await fetch(CFG.SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,...p})});return await r.json()}
  catch(e){return{success:false,error:e.message}}
}

async function doAuth(){
  const email=document.getElementById('i-email').value.trim();
  const pass=document.getElementById('i-pass').value;
  const err=document.getElementById('a-err');
  err.style.display='none';
  if(!email||!pass){err.textContent='กรุณากรอกข้อมูลให้ครบ';err.style.display='block';return}
  if(pass.length<6){err.textContent='รหัสผ่านอย่างน้อย 6 ตัวอักษร';err.style.display='block';return}
  const btn=document.getElementById('a-btn');btn.textContent='⏳ กำลังดำเนินการ...';btn.disabled=true;
  let res;
  if(S.isR){
    const name=document.getElementById('i-name').value.trim();
    const conf=document.getElementById('i-conf').value;
    if(!name){err.textContent='กรุณากรอกชื่อ';err.style.display='block';btn.textContent='สมัครสมาชิก';btn.disabled=false;return}
    if(pass!==conf){err.textContent='รหัสผ่านไม่ตรงกัน';err.style.display='block';btn.textContent='สมัครสมาชิก';btn.disabled=false;return}
    res=await api('register',{name,email,password:pass});
  }else{res=await api('login',{email,password:pass})}
  btn.textContent=S.isR?'สมัครสมาชิก':'เข้าสู่ระบบ';btn.disabled=false;
  if(res.success){S.u=res.user;localStorage.setItem('hs',JSON.stringify(res.user));enterApp()}
  else{err.textContent=res.error||'เกิดข้อผิดพลาด';err.style.display='block'}
}

// SHARES CALC
function calcSh(exps){
  const sh={};S.d.members.forEach(m=>sh[m.id]=0);
  exps.forEach(exp=>{
    const g=S.d.groups.find(g=>g.type===exp.type);if(!g)return;
    g.members.forEach(gm=>{if(!sh[gm.userId])sh[gm.userId]=0;sh[gm.userId]+=(exp.netAmount||exp.amount)*(gm.percent/100)});
  });
  return sh;
}

// REPORT
function rReport(){
  const map={};S.d.expenses.forEach(e=>{if(!map[e.monthKey])map[e.monthKey]=[];map[e.monthKey].push(e)});
  const months=Object.keys(map).sort().reverse();
  if(!months.length)return`<div class="empty" style="margin-top:3rem"><div class="empty-i">📊</div><div class="empty-t">ยังไม่มีรายงาน</div><div class="empty-s">กรอกข้อมูลค่าใช้จ่ายก่อนนะครับ</div></div>`;
  return months.map(m=>{
    const exps=map[m];
    const tot=exps.reduce((s,e)=>s+(e.netAmount||e.amount||0),0);
    const sh={};
    exps.forEach(exp=>{const g=S.d.groups.find(g=>g.type===exp.type);if(!g)return;g.members.forEach(gm=>{if(!sh[gm.userId])sh[gm.userId]={name:gm.name,tot:0};sh[gm.userId].tot+=(exp.netAmount||exp.amount)*(gm.percent/100)})});

    return`<div class="card" style="margin-bottom:14px"><div class="cb">
      <div class="rph"><div class="rph-m">📅 ${lbl}</div><div class="rph-t">฿${fmt(tot)}</div></div>

  const m=mkK(),ex=S.d.expenses.find(e=>e.type===type&&e.monthKey===m);if(!ex)return;
  document.getElementById('me-title').textContent='แก้ไข'+CFG.T[type].l;
  document.getElementById('me-type').value=type;document.getElementById('me-amt').value=ex.amount;
  document.getElementById('me-note').value=ex.note||'';document.getElementById('me-evu').value=ex.evUnits||'';document.getElementById('me-evr').value=ex.evRate||4;
  onTC();showMo('mo-exp');
}
function onTC(){
  const t=document.getElementById('me-type').value,isEV=t==='electric';
  document.getElementById('ev-sec').style.display=isEV?'':'none';
  document.getElementById('net-box').style.display='none';calcN();
}
function calcN(){
  if(document.getElementById('me-type').value!=='electric')return;
  const amt=parseFloat(document.getElementById('me-amt').value)||0;
  const ev=parseFloat(document.getElementById('me-evu').value)||0;
  const rate=parseFloat(document.getElementById('me-evr').value)||4;
  const net=Math.max(0,amt-(ev*rate));
  document.getElementById('net-v').textContent='฿'+fmt(net);
  document.getElementById('net-box').style.display=amt>0?'':'none';
}
async function saveExp(){
  const type=document.getElementById('me-type').value;
  const amount=parseFloat(document.getElementById('me-amt').value);
  const note=document.getElementById('me-note').value.trim();
  const evU=parseFloat(document.getElementById('me-evu').value)||0;
  const evR=parseFloat(document.getElementById('me-evr').value)||4;
  if(!amount||amount<=0){toast('❌ กรุณากรอกยอดเงิน');return}
  const net=type==='electric'?Math.max(0,amount-(evU*evR)):amount;
  const m=mkK();
  const exp={monthKey:m,type,amount,netAmount:net,note,evUnits:type==='electric'?evU:0,evRate:type==='electric'?evR:0,createdBy:S.u.id};
  S.d.expenses=S.d.expenses.filter(e=>!(e.type===type&&e.monthKey===m));
  const res=await api('addExpense',{expense:exp});
  S.d.expenses.push(res.expense||{id:'e'+Date.now(),...exp,createdAt:new Date().toISOString()});
  closeMo('mo-exp');toast('✅ บันทึกสำเร็จ');go(S.tab);
}

// SETTINGS
function updP(gid,uid,val){
  const g=S.d.groups.find(g=>g.id===gid);if(!g)return;
  const m=g.members.find(m=>m.userId===uid);if(m)m.percent=parseInt(val)||0;
  const tot=g.members.reduce((s,m)=>s+m.percent,0);
  const b=document.getElementById('spt-'+gid);
  if(b){b.textContent=`รวม ${tot}%`;b.className='badge '+(tot===100?'bok':tot>100?'bw':'bp')}
}
async function saveGrp(){const res=await api('updateGroup',{groups:S.d.groups});toast(res.success!==false?'✅ บันทึกสำเร็จ':'❌ บันทึกไม่สำเร็จ')}

// PDF EXPORT
function expPDF(m,lbl,tot){
  const exps=S.d.expenses.filter(e=>e.monthKey===m);
  const sh={};
  exps.forEach(exp=>{const g=S.d.groups.find(g=>g.type===exp.type);if(!g)return;g.members.forEach(gm=>{if(!sh[gm.userId])sh[gm.userId]={name:gm.name,tot:0,items:[]};const s=(exp.netAmount||exp.amount)*(gm.percent/100);sh[gm.userId].tot+=s;sh[gm.userId].items.push({n:CFG.T[exp.type]?.l,p:gm.percent,s})})});
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>HomeSplit ${lbl}</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'IBM Plex Sans Thai',sans-serif;max-width:700px;margin:40px auto;color:#111827;font-size:14px;padding:0 20px}h1{color:#18A0A0;font-size:24px;margin-bottom:4px;font-weight:800}.sub{color:#6B7280;font-size:13px;margin-bottom:28px}h2{font-size:15px;font-weight:700;margin:24px 0 10px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#2CC6C6;color:#fff;padding:11px 14px;text-align:left;font-size:13px;font-weight:700}td{padding:10px 14px;border-bottom:1px solid #E6F8F8;font-size:13px}.tot td{font-weight:700;background:#E6F8F8;color:#18A0A0;font-size:14px}.uc{border:1.5px solid #B8E8E8;border-radius:12px;margin-bottom:14px;overflow:hidden}.uh{background:#2CC6C6;color:#fff;padding:11px 16px;font-weight:700;font-size:14px}.us{background:#E6F8F8;padding:11px 16px;font-weight:800;color:#18A0A0;font-size:16px}@media print{button{display:none}}</style>
  </head><body>
  <h1>🏠 HomeSplit รายงานประจำเดือน</h1>
  <div class="sub">บ้านเลขที่ 54/145 · ${lbl} · ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}</div>
  <h2>รายการค่าใช้จ่าย</h2>
  <table><thead><tr><th>รายการ</th><th>ยอดรวม (บาท)</th><th>หมายเหตุ</th></tr></thead><tbody>
  ${exps.map(e=>`<tr><td>${CFG.T[e.type]?.i} ${CFG.T[e.type]?.l||e.type}</td><td>฿${fmt(e.netAmount||e.amount)}</td><td>${e.note||'-'}</td></tr>`).join('')}
  <tr class="tot"><td>รวมทั้งหมด</td><td>฿${fmt(tot)}</td><td></td></tr></tbody></table>
  <h2>สรุปยอดต่อคน</h2>
  ${Object.values(sh).map(u=>`<div class="uc"><div class="uh">👤 ${u.name}</div><table style="margin:0"><tbody>${u.items.map(i=>`<tr><td>${i.n}</td><td>${i.p}%</td><td style="text-align:right;font-weight:600">฿${fmt(i.s)}</td></tr>`).join('')}</tbody></table><div class="us">รวม: ฿${fmt(u.tot)}</div></div>`).join('')}
  <br><button onclick="window.print()" style="background:#2CC6C6;color:#fff;border:none;padding:13px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">🖨️ พิมพ์ / บันทึก PDF</button>
  </body></html>`);
  w.document.close();toast('📄 เปิดหน้า PDF แล้ว');
}
